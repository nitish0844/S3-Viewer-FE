name: Build Electron App

on:

  push:

    tags:
      - "v*"


jobs:

  build:

    strategy:

      matrix:

        os:
          - macos-latest
          - windows-latest

    runs-on:
      ${{ matrix.os }}


    steps:

      - name: Checkout

        uses:
          actions/checkout@v4


      - name: Setup Node

        uses:
          actions/setup-node@v4

        with:
          node-version: 20


      - name: Install Dependencies

        run: npm install


      - name: Build App

        run: npm run dist

        env:

          GH_TOKEN:
            ${{ secrets.GH_TOKEN }}

          VITE_API_BASE_URL:
            ${{ secrets.VITE_API_BASE_URL }}

          VITE_ENC_KEY:
            ${{ secrets.VITE_ENC_KEY }}